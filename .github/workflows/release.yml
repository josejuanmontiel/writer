name: Release

on:
  push:
    tags:
      - 'v*'

# AÑADIDO: Permisos necesarios para crear la release y subir assets
permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: antigravity-writer-linux-offline.tar.gz
          - os: ubuntu-latest
            platform: windows
            artifact: antigravity-writer-windows-offline.zip
          - os: macos-latest
            platform: macos
            artifact: antigravity-writer-macos-offline.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Assets
        id: cache-assets
        uses: actions/cache@v4
        with:
          path: |
            models/
            lib/windows/
            lib/tokenizers/
            lib/onnxruntime/
          key: ${{ runner.os }}-assets-${{ hashFiles('.github/workflows/release.yml') }}

      - name: Download Assets from Hugging Face
        if: steps.cache-assets.outputs.cache-hit != 'true'
        run: |
          # Usamos wget para bajar los modelos y librerías
          # Bajamos los modelos
          mkdir -p models/gliner2_native
          wget -q -O models/ggml-tiny.bin https://huggingface.co/josejuanmontiel/writer-models/resolve/main/models/ggml-tiny.bin
          wget -q -O models/gliner2_native/count_embed.onnx https://huggingface.co/josejuanmontiel/writer-models/resolve/main/models/gliner2_native/count_embed.onnx
          wget -q -O models/gliner2_native/count_embed.onnx.data https://huggingface.co/josejuanmontiel/writer-models/resolve/main/models/gliner2_native/count_embed.onnx.data
          wget -q -O models/gliner2_native/encoder.onnx https://huggingface.co/josejuanmontiel/writer-models/resolve/main/models/gliner2_native/encoder.onnx
          wget -q -O models/gliner2_native/encoder.onnx.data https://huggingface.co/josejuanmontiel/writer-models/resolve/main/models/gliner2_native/encoder.onnx.data
          wget -q -O models/gliner2_native/gliner_classifiers.safetensors https://huggingface.co/josejuanmontiel/writer-models/resolve/main/models/gliner2_native/gliner_classifiers.safetensors
          wget -q -O models/gliner2_native/prompt_ids.json https://huggingface.co/josejuanmontiel/writer-models/resolve/main/models/gliner2_native/prompt_ids.json
          wget -q -O models/gliner2_native/tokenizer.json https://huggingface.co/josejuanmontiel/writer-models/resolve/main/models/gliner2_native/tokenizer.json
          
          # Bajamos las librerías necesarias para compilar/enlace
          mkdir -p lib/windows lib/onnxruntime/lib
          wget -q -O lib/onnxruntime/lib/libonnxruntime.so.1.22.0 https://huggingface.co/josejuanmontiel/writer-models/resolve/main/lib/onnxruntime/lib/libonnxruntime.so.1.22.0
          
          # DLLs para Windows
          wget -q -O lib/windows/ggml-base.dll https://huggingface.co/josejuanmontiel/writer-models/resolve/main/lib/windows/ggml-base.dll
          wget -q -O lib/windows/ggml-cpu.dll https://huggingface.co/josejuanmontiel/writer-models/resolve/main/lib/windows/ggml-cpu.dll
          wget -q -O lib/windows/ggml.dll https://huggingface.co/josejuanmontiel/writer-models/resolve/main/lib/windows/ggml.dll
          wget -q -O lib/windows/onnxruntime.dll https://huggingface.co/josejuanmontiel/writer-models/resolve/main/lib/windows/onnxruntime.dll
          wget -q -O lib/windows/SDL2.dll https://huggingface.co/josejuanmontiel/writer-models/resolve/main/lib/windows/SDL2.dll
          wget -q -O lib/windows/whisper.dll https://huggingface.co/josejuanmontiel/writer-models/resolve/main/lib/windows/whisper.dll
          
          # Descarga de libtokenizers para Linux (necesaria para el enlazado)
          if [ "${{ matrix.platform }}" == "linux" ]; then
            mkdir -p lib/tokenizers
            wget -q -O libtokenizers.tar.gz https://github.com/daulet/tokenizers/releases/download/v1.26.0/libtokenizers.linux-amd64.tar.gz
            tar -xzf libtokenizers.tar.gz -C lib/tokenizers
            rm libtokenizers.tar.gz
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            mkdir -p lib/tokenizers
            wget -q -O libtokenizers.tar.gz https://github.com/daulet/tokenizers/releases/download/v1.26.0/libtokenizers.darwin-x86_64.tar.gz
            tar -xzf libtokenizers.tar.gz -C lib/tokenizers
            rm libtokenizers.tar.gz
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            # Windows usa la librería estática que subimos a HF (compilada manualmente)
            mkdir -p lib/windows
            wget -q -O lib/windows/libtokenizers.a https://huggingface.co/josejuanmontiel/writer-models/resolve/main/lib/windows/libtokenizers.a
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Ajustado a la versión actual estable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add GOBIN to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev cmake

      - name: Install Windows Dependencies
        if: matrix.platform == 'windows'
        run: sudo apt-get install -y gcc-mingw-w64 g++-mingw-w64 binutils-mingw-w64

      - name: Cleanup LFS Pointers
        run: |
          # Borramos archivos que puedan ser punteros de LFS y causar conflictos
          rm -f lib/windows/libdl.a
          rm -f lib/windows/libtokenizers.a
          rm -f lib/windows/onnxruntime.lib
          rm -f lib/tokenizers/libtokenizers.a

      - name: Build whisper.cpp (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd lib/whisper.cpp
          if [ "${{ matrix.platform }}" == "macos" ]; then
            cmake -B build -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DWHISPER_BUILD_EXAMPLES=OFF -DWHISPER_BUILD_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          else
            cmake -B build -DWHISPER_BUILD_EXAMPLES=OFF -DWHISPER_BUILD_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          fi
          cmake --build build --config Release
          
          # Renombramos las librerías para que el linker las encuentre con el prefijo 'lib' (importante en Mac)
          find build -name "*.a" -exec bash -c 'dir=$(dirname "{}"); base=$(basename "{}"); if [[ ! $base =~ ^lib ]]; then mv "{}" "$dir/lib$base"; fi' \;

      - name: Build whisper.cpp (Windows Cross-Compile)
        if: matrix.platform == 'windows'
        run: |
          cd lib/whisper.cpp
          # Usamos un toolchain file o variables manuales para MinGW
          # Definimos _WIN32_WINNT=0x0601 para evitar errores con THREAD_POWER_THROTTLING_STATE
          cmake -B build-win -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_C_FLAGS="-D_WIN32_WINNT=0x0601" \
            -DCMAKE_CXX_FLAGS="-D_WIN32_WINNT=0x0601" \
            -DWHISPER_BUILD_EXAMPLES=OFF -DWHISPER_BUILD_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          cmake --build build-win --config Release
          
          # Renombramos las librerías para que el linker las encuentre con el prefijo 'lib'
          find build-win -name "*.a" -exec bash -c 'dir=$(dirname "{}"); base=$(basename "{}"); if [[ ! $base =~ ^lib ]]; then mv "{}" "$dir/lib$base"; fi' \;

      - name: Build and Package
        run: |
          # Aseguramos que wails esté en el path
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # Definimos variables base comunes
          export CGO_ENABLED=1
          export CGO_CFLAGS="-I${{ github.workspace }}/lib/whisper.cpp/include -I${{ github.workspace }}/lib/whisper.cpp/ggml/include"
          
          # Añadimos las librerías al PATH de ejecución para que Wails pueda generar bindings
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:${{ github.workspace }}/lib/whisper.cpp/build/src:${{ github.workspace }}/lib/whisper.cpp/build/ggml/src:${{ github.workspace }}/lib/onnxruntime/lib
          export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:${{ github.workspace }}/lib/whisper.cpp/build/src:${{ github.workspace }}/lib/whisper.cpp/build/ggml/src
          
          if [ "${{ matrix.platform }}" == "linux" ]; then
            export CGO_LDFLAGS="-L${{ github.workspace }}/lib/whisper.cpp/build/src -L${{ github.workspace }}/lib/whisper.cpp/build/ggml/src -L${{ github.workspace }}/lib/onnxruntime/lib"
            make package-linux
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            # Windows usa las librerías recién compiladas en build-win/src
            # Y la de tokenizers que bajamos de HF
            export CGO_LDFLAGS="-L${{ github.workspace }}/lib/whisper.cpp/build-win/src -L${{ github.workspace }}/lib/whisper.cpp/build-win/ggml/src -L${{ github.workspace }}/lib/windows"
            make package-windows
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            export CGO_LDFLAGS="-L${{ github.workspace }}/lib/whisper.cpp/build/src -L${{ github.workspace }}/lib/whisper.cpp/build/ggml/src"
            make package-macos
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
