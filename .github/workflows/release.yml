name: Release

on:
  push:
    tags:
      - 'v*'

# AÑADIDO: Permisos necesarios para crear la release y subir assets
permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: antigravity-writer-linux-offline.tar.gz
          - os: ubuntu-latest
            platform: windows
            artifact: antigravity-writer-windows-offline.zip
          - os: macos-latest
            platform: macos
            artifact: antigravity-writer-macos-offline.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      # AÑADIDO: Asegurar que los archivos LFS se descargan realmente
      - name: Pull LFS objects
        run: git lfs pull

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Ajustado a la versión actual estable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add GOBIN to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev cmake

      - name: Install MinGW (Windows Build)
        if: matrix.platform == 'windows'
        run: sudo apt-get install -y gcc-mingw-w64

      - name: Build whisper.cpp
        if: matrix.platform != 'windows'
        run: |
          cd lib/whisper.cpp
          if [ "${{ matrix.platform }}" == "macos" ]; then
            cmake -B build -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" -DWHISPER_BUILD_EXAMPLES=OFF -DWHISPER_BUILD_TESTS=OFF
          else
            cmake -B build -DWHISPER_BUILD_EXAMPLES=OFF -DWHISPER_BUILD_TESTS=OFF
          fi
          cmake --build build --config Release

      - name: Build and Package
        env:
          CGO_ENABLED: "1"
          GOTOOLCHAIN: "local"
          # Definimos las rutas para que los bindings encuentren whisper y ggml
          CGO_CFLAGS: "-I${{ github.workspace }}/lib/whisper.cpp/include -I${{ github.workspace }}/lib/whisper.cpp/ggml/include"
          # LDFLAGS apunta a las carpetas donde cmake dejó las librerías .a (y a lib/windows para windows)
          CGO_LDFLAGS: "-L${{ github.workspace }}/lib/whisper.cpp/build/src -L${{ github.workspace }}/lib/whisper.cpp/build/ggml/src -L${{ github.workspace }}/lib/windows -L${{ github.workspace }}/lib/onnxruntime/lib"
        run: |
          # Aseguramos que wails esté en el path
          export PATH=$PATH:$(go env GOPATH)/bin
          if [ "${{ matrix.platform }}" == "linux" ]; then
            make package-linux
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            make package-windows
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            make package-macos
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
