name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact: antigravity-writer-linux-offline.tar.gz
          - os: ubuntu-latest
            platform: windows
            artifact: antigravity-writer-windows-offline.zip
          - os: macos-latest
            platform: macos
            artifact: antigravity-writer-macos-offline.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add GOBIN to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install MinGW (Windows Build)
        if: matrix.platform == 'windows'
        run: sudo apt-get install -y gcc-mingw-w64

      - name: Build and Package
        run: |
          if [ "${{ matrix.platform }}" == "linux" ]; then
            make package-linux
          elif [ "${{ matrix.platform }}" == "windows" ]; then
            make package-windows
          elif [ "${{ matrix.platform }}" == "macos" ]; then
            make package-macos
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
